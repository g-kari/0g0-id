name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: lint・fmt・型チェック・テスト
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v6

      - name: Vite+ セットアップ
        run: |
          curl -fsSL https://vite.plus | bash
          echo "$HOME/.vite-plus/bin" >> $GITHUB_PATH

      - name: Node.js セットアップ
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: 依存パッケージインストール
        run: npm ci

      - name: check（lint + fmt + typecheck）
        run: vp check

      - name: テスト実行
        run: vp test run
