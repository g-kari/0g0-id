name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: lint・fmt・型チェック・テスト
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v6

      - name: Vite+ セットアップ
        run: |
          curl -fsSL https://vite.plus | bash
          echo "$HOME/.vite-plus/bin" >> $GITHUB_PATH

      - name: Node.js セットアップ
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: 依存パッケージインストール（ルートワークスペース）
        run: npm ci

      - name: 依存パッケージインストール（user frontend）
        # workers/*/frontend は npm workspaces 対象外のため個別に install が必要
        # （astro/tsconfigs/strict を解決するために frontend node_modules が必要）
        run: npm ci
        working-directory: workers/user/frontend

      - name: 依存パッケージインストール（admin frontend）
        run: npm ci
        working-directory: workers/admin/frontend

      - name: check（lint + fmt + typecheck）
        run: vp check

      - name: テスト実行
        run: vp test run

      - name: フロントエンドビルド検証（user）
        run: npm run build
        working-directory: workers/user/frontend

      - name: フロントエンドビルド検証（admin）
        run: npm run build
        working-directory: workers/admin/frontend

  audit:
    name: npm audit（脆弱性チェック）
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v6

      - name: Node.js セットアップ
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: 依存パッケージインストール（ルートワークスペース）
        run: npm ci

      - name: npm audit（high以上で失敗）
        run: npm audit --audit-level=high

      - name: npm audit — user frontend
        run: npm ci && npm audit --audit-level=high
        working-directory: workers/user/frontend

      - name: npm audit — admin frontend
        run: npm ci && npm audit --audit-level=high
        working-directory: workers/admin/frontend
