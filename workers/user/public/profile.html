<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0g0 ID - プロフィール</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="card" id="profile-card" style="display:none;">
      <img id="avatar" class="avatar" src="" alt="プロフィール画像" width="64" height="64">
      <p class="profile-name" id="profile-name"></p>
      <p class="profile-email" id="profile-email"></p>

      <hr class="divider">

      <div id="edit-msg" class="alert" style="display:none;" role="alert"></div>

      <form id="edit-form">
        <div class="form-group">
          <label for="name-input">表示名</label>
          <input type="text" id="name-input" name="name" required minlength="1" maxlength="100">
        </div>
        <div class="gap-2">
          <button type="submit" class="btn btn-primary">保存</button>
          <button type="button" class="btn btn-danger" id="logout-btn">ログアウト</button>
        </div>
      </form>
    </div>
    <div id="loading" class="card">
      <p style="color:var(--text-muted);text-align:center;">読み込み中...</p>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
