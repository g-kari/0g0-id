name = "0g0-id-user"
main = "src/index.ts"
compatibility_date = "2025-04-01"
workers_dev = false

[observability.logs]
enabled = true
invocation_logs = true

routes = [{ pattern = "user.0g0.xyz", custom_domain = true }]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/*", "!/_astro/*", "!/favicon.svg", "!/robots.txt"]

[vars]
IDP_ORIGIN = "https://id.0g0.xyz"
SELF_ORIGIN = "https://user.0g0.xyz"

[[services]]
binding = "IDP"
service = "0g0-id"

[[unsafe.bindings]]
name = "RATE_LIMITER_USER_AUTH"
type = "ratelimit"
namespace_id = "2001"
simple = { limit = 20, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_USER_API"
type = "ratelimit"
namespace_id = "2002"
simple = { limit = 100, period = 60 }
