<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0g0 ID Admin - ユーザー管理</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar" aria-label="サイドバーナビゲーション">
      <div class="sidebar-logo">0g0 ID Admin</div>
      <div class="sidebar-nav">
        <a href="/dashboard.html">
          <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
          ダッシュボード
        </a>
        <a href="/services.html">
          <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
          サービス管理
        </a>
        <a href="/users.html" class="active">
          <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.87"/></svg>
          ユーザー管理
        </a>
      </div>
    </nav>
    <main class="main">
      <div class="page-header">
        <h1>ユーザー管理</h1>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table id="users-table" aria-label="ユーザー一覧">
            <thead>
              <tr>
                <th>名前</th>
                <th>メールアドレス</th>
                <th>ロール</th>
                <th>状態</th>
                <th>登録日</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="users-body">
              <tr><td colspan="6" style="text-align:center;color:var(--text-muted);">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <!-- ユーザー詳細モーダル -->
  <div class="modal-overlay" id="user-detail-modal" hidden role="dialog" aria-modal="true" aria-labelledby="user-detail-title">
    <div class="modal modal-lg" style="max-height:90vh;display:flex;flex-direction:column;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
        <h2 id="user-detail-title" style="margin-bottom:0;"></h2>
        <button class="btn btn-secondary btn-sm" id="user-detail-close-btn" aria-label="閉じる">閉じる</button>
      </div>
      <nav class="tab-nav" aria-label="ユーザー詳細タブ">
        <button class="tab-btn active" data-tab="profile" aria-selected="true">プロフィール</button>
        <button class="tab-btn" data-tab="login-history" aria-selected="false">ログイン履歴</button>
        <button class="tab-btn" data-tab="providers" aria-selected="false">プロバイダー</button>
        <button class="tab-btn" data-tab="services" aria-selected="false">サービス</button>
        <button class="tab-btn" data-tab="sessions" aria-selected="false">セッション</button>
      </nav>
      <div id="user-detail-content" style="overflow-y:auto;flex:1;min-height:0;">
        <div id="tab-profile"></div>
        <div id="tab-login-history" hidden></div>
        <div id="tab-providers" hidden></div>
        <div id="tab-services" hidden></div>
        <div id="tab-sessions" hidden></div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
