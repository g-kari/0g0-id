name = "0g0-id"
main = "src/index.ts"
compatibility_date = "2024-11-01"
workers_dev = false

[triggers]
crons = ["0 0 * * *"]

[observability.logs]
enabled = true
invocation_logs = true

routes = [{ pattern = "id.0g0.xyz", custom_domain = true }]

# 静的エンドポイント（.well-known / OpenAPI JSON）を Workers Assets 経由で配信する。
# `npm run build:assets` で dist/ に生成した JSON をエッジから直接返す。
# run_worker_first のデフォルトは Worker 優先。除外した 5 パスのみ Assets が先行。
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "none"
run_worker_first = [
  "/*",
  "!/.well-known/jwks.json",
  "!/.well-known/openid-configuration",
  "!/.well-known/oauth-authorization-server",
  "!/docs/openapi.json",
  "!/docs/external/openapi.json",
]

[vars]
IDP_ORIGIN = "https://id.0g0.xyz"
USER_ORIGIN = "https://user.0g0.xyz"
ADMIN_ORIGIN = "https://admin.0g0.xyz"
# COOKIE_SECRET はシークレットのため [vars] に記載せず wrangler secret put COOKIE_SECRET で設定すること

[[d1_databases]]
binding = "DB"
database_name = "0g0-id-db"
database_id = "f13d6e85-7a42-463f-b07e-5201423dc840"
migrations_dir = "../../migrations"

[[kv_namespaces]]
binding = "LINK_TOKEN_KV"
id = "d32e6c76dde24764ab02d4c9202ddb35"

[[unsafe.bindings]]
name = "RATE_LIMITER_AUTH"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_EXTERNAL"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 200, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_TOKEN"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 30, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_DEVICE_VERIFY"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 10, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_TOKEN_CLIENT"
type = "ratelimit"
namespace_id = "1005"
simple = { limit = 100, period = 60 }
